<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    overflow: hidden;
  }

  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap');

  .btn-chat {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 16px 32px;
    background: linear-gradient(135deg, #c9a84c, #e8c97a, #c9a84c);
    background-size: 200% 200%;
    animation: shimmer 3s ease infinite;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 8px 30px rgba(201,168,76,0.4), 0 2px 8px rgba(0,0,0,0.2);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-chat:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 14px 40px rgba(201,168,76,0.55), 0 4px 12px rgba(0,0,0,0.25);
  }

  .btn-chat:active {
    transform: translateY(0) scale(0.98);
  }

  @keyframes shimmer {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .btn-icon {
    width: 28px;
    height: 28px;
    background: rgba(13,27,42,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .btn-icon svg {
    width: 16px;
    height: 16px;
    fill: #0d1b2a;
  }

  .btn-text {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    line-height: 1.2;
  }

  .btn-label {
    font-size: 15px;
    font-weight: 600;
    color: #0d1b2a;
    font-family: 'Playfair Display', Georgia, serif;
    letter-spacing: 0.3px;
  }

  .btn-sub {
    font-size: 11px;
    color: rgba(13,27,42,0.6);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
  }

  /* Pulse no ícone */
  .pulse-dot {
    width: 8px;
    height: 8px;
    background: #2ecc71;
    border-radius: 50%;
    position: relative;
    flex-shrink: 0;
  }
  .pulse-dot::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 2px solid #2ecc71;
    animation: pulse 1.5s ease infinite;
  }
  @keyframes pulse {
    0%   { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(2); }
  }
</style>
</head>
<body>

<a class="btn-chat" href="https://teraanis.github.io/teraani-widget/" target="_blank">
  <div class="btn-icon">
    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
  </div>
  <div class="btn-text">
    <span class="btn-label">Falar com a IA agora</span>
    <span class="btn-sub">Assistente especialista em vistos</span>
  </div>
  <div class="pulse-dot"></div>
</a>

</body>
</html>
