<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent !important;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  :root {
    --navy: #0d1b2a;
    --navy-mid: #1a2e45;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --white: #ffffff;
    --radius: 18px;
    --shadow: 0 20px 60px rgba(13,27,42,0.35);
  }

  /* ── Botão flutuante ── */
  #chat-toggle {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border: none;
    cursor: pointer;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    z-index: 999;
  }
  #chat-toggle:hover {
    transform: scale(1.1);
    box-shadow: 0 25px 70px rgba(201,168,76,0.4);
  }
  #chat-toggle svg { width: 26px; height: 26px; fill: var(--navy); }

  /* Badge de notificação */
  #notif-badge {
    position: absolute;
    top: -2px;
    right: -2px;
    width: 18px;
    height: 18px;
    background: #e05c5c;
    border-radius: 50%;
    border: 2px solid white;
    font-size: 10px;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-family: sans-serif;
  }

  /* ── Janela do chat ── */
  #chat-window {
    position: fixed;
    bottom: 96px;
    right: 24px;
    width: 370px;
    height: 520px;
    background: var(--navy);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 998;
    animation: slideUp 0.3s ease;
  }
  #chat-window.open { display: flex; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  #chat-header {
    background: linear-gradient(135deg, var(--navy-mid), var(--navy));
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid rgba(201,168,76,0.2);
  }
  #avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  #header-info { flex: 1; }
  #header-name {
    font-family: 'Georgia', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--white);
  }
  #header-status {
    font-size: 11px;
    color: var(--gold-light);
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 2px;
  }
  #header-status::before {
    content: '';
    width: 7px;
    height: 7px;
    background: #4caf82;
    border-radius: 50%;
    display: inline-block;
  }
  #close-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    font-size: 20px;
    padding: 4px;
    line-height: 1;
    transition: color 0.2s;
  }
  #close-btn:hover { color: var(--white); }

  /* Mensagens */
  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: thin;
    scrollbar-color: rgba(201,168,76,0.3) transparent;
  }

  .msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.5;
    font-family: 'Georgia', serif;
  }
  .msg-bot {
    background: var(--navy-mid);
    color: rgba(255,255,255,0.9);
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    border: 1px solid rgba(201,168,76,0.15);
  }
  .msg-user {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--navy);
    border-bottom-right-radius: 4px;
    align-self: flex-end;
    font-weight: 500;
  }
  .msg-time {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    margin-top: 3px;
    font-family: sans-serif;
  }
  .msg-user + .msg-time { text-align: right; }

  /* Typing */
  #typing-indicator {
    display: none;
    align-self: flex-start;
    background: var(--navy-mid);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    padding: 10px 16px;
  }
  #typing-indicator span {
    display: inline-block;
    width: 7px;
    height: 7px;
    background: var(--gold);
    border-radius: 50%;
    margin: 0 2px;
    animation: bounce 1.2s infinite;
  }
  #typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  #typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Input */
  #chat-footer {
    padding: 12px 16px;
    border-top: 1px solid rgba(201,168,76,0.15);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: var(--navy);
  }
  #chat-input {
    flex: 1;
    background: var(--navy-mid);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--white);
    font-size: 13.5px;
    font-family: 'Georgia', serif;
    resize: none;
    outline: none;
    max-height: 100px;
    line-height: 1.4;
  }
  #chat-input::placeholder { color: rgba(255,255,255,0.3); }
  #chat-input:focus { border-color: rgba(201,168,76,0.5); }

  #send-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, opacity 0.2s;
    flex-shrink: 0;
  }
  #send-btn:hover { transform: scale(1.1); }
  #send-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
  #send-btn svg { width: 18px; height: 18px; fill: var(--navy); }

  /* Quick replies */
  #quick-replies {
    display: flex;
    gap: 6px;
    padding: 0 16px 10px;
    overflow-x: auto;
    scrollbar-width: none;
    flex-wrap: nowrap;
  }
  .quick-btn {
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 20px;
    padding: 5px 12px;
    color: var(--gold-light);
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    font-family: sans-serif;
    transition: background 0.2s;
  }
  .quick-btn:hover { background: rgba(201,168,76,0.25); }

  /* Footer crédito */
  #chat-credit {
    text-align: center;
    padding: 6px;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    font-family: sans-serif;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  #chat-credit a { color: var(--gold); text-decoration: none; }
</style>
</head>
<body>

<!-- Botão flutuante -->
<button id="chat-toggle" onclick="toggleChat()">
  <div id="notif-badge">1</div>
  <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
</button>

<!-- Janela do chat -->
<div id="chat-window">
  <div id="chat-header">
    <div id="avatar">🤝</div>
    <div id="header-info">
      <div id="header-name">Teraani IA</div>
      <div id="header-status">Assistente especialista em vistos</div>
    </div>
    <button id="close-btn" onclick="toggleChat()">×</button>
  </div>

  <div id="chat-messages"></div>
  <div id="typing-indicator"><span></span><span></span><span></span></div>

  <div id="quick-replies">
    <button class="quick-btn" onclick="sendQuick('Visto americano B1/B2')">🇺🇸 Visto B1/B2</button>
    <button class="quick-btn" onclick="sendQuick('DS-160 formulário')">📋 DS-160</button>
    <button class="quick-btn" onclick="sendQuick('Visto Canadá')">🇨🇦 Canadá</button>
    <button class="quick-btn" onclick="sendQuick('Quanto custa?')">💰 Preços</button>
  </div>

  <div id="chat-footer">
    <textarea id="chat-input" placeholder="Digite sua mensagem..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <div id="chat-credit">Powered by <a href="https://teraanis.github.io/teraani-widget/" target="_blank">Teraani Vistos</a> · IA com tecnologia n8n</div>
</div>

<script>
  const WEBHOOK_URL = 'http://129.148.30.27:5678/webhook/teraani-chat';

  let isOpen = false;
  let isTyping = false;
  let messageHistory = [];
  let sessionId = 'sess_' + Math.random().toString(36).substr(2, 9);

  function toggleChat() {
    isOpen = !isOpen;
    const win = document.getElementById('chat-window');
    const badge = document.getElementById('notif-badge');
    if (isOpen) {
      win.classList.add('open');
      badge.style.display = 'none';
      if (messageHistory.length === 0) showWelcome();
      setTimeout(() => document.getElementById('chat-input').focus(), 300);
    } else {
      win.classList.remove('open');
    }
  }

  function showWelcome() {
    addBotMessage('Olá! 👋 Sou a assistente virtual da **Teraani Vistos**.\n\nPosso te ajudar com vistos americanos, canadenses e o preenchimento do DS-160.\n\n**Como posso te ajudar hoje?**');
  }

  function addBotMessage(text) {
    const msgs = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'msg msg-bot';
    div.innerHTML = formatText(text);
    msgs.appendChild(div);
    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = getTime();
    msgs.appendChild(time);
    scrollBottom();
  }

  function addUserMessage(text) {
    const msgs = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'msg msg-user';
    div.textContent = text;
    msgs.appendChild(div);
    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = getTime();
    msgs.appendChild(time);
    scrollBottom();
  }

  function showTyping() { document.getElementById('typing-indicator').style.display = 'flex'; scrollBottom(); }
  function hideTyping() { document.getElementById('typing-indicator').style.display = 'none'; }

  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text || isTyping) return;

    input.value = '';
    input.style.height = 'auto';
    addUserMessage(text);
    messageHistory.push({ role: 'user', content: text });
    isTyping = true;
    document.getElementById('send-btn').disabled = true;
    document.getElementById('quick-replies').style.display = 'none';
    showTyping();

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sessionId,
          message: text,
          history: messageHistory.slice(-10),
          source: 'web-widget',
          timestamp: new Date().toISOString(),
        }),
      });
      const data = await response.json();
      const reply = data.reply || data.message || data.text || data.output || 'Desculpe, não consegui processar sua mensagem.';
      hideTyping();
      addBotMessage(reply);
      messageHistory.push({ role: 'assistant', content: reply });
    } catch (err) {
      hideTyping();
      addBotMessage('⚠️ Erro de conexão. Tente novamente em instantes.');
    }

    isTyping = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('chat-input').focus();
  }

  function sendQuick(text) {
    document.getElementById('chat-input').value = text;
    sendMessage();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function scrollBottom() {
    const msgs = document.getElementById('chat-messages');
    setTimeout(() => msgs.scrollTop = msgs.scrollHeight, 50);
  }

  function getTime() {
    return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function formatText(text) {
    return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
  }
</script>
</body>
</html>
